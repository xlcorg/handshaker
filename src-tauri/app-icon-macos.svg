<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Handshaker app icon — H-Bridge (mono on dark squircle).
       macOS framing: Apple grid — 824x824 icon within a 1024 canvas (100px gutter),
       corner radius 185.4 (~0.225). Rounding is baked in (AppKit does not auto-mask). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23272F"/>
      <stop offset="1" stop-color="#0B0D11"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.13"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mono" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C9CFD9"/>
    </linearGradient>
  </defs>

  <rect x="100" y="100" width="824" height="824" rx="185.4" fill="url(#bg)"/>
  <rect x="105" y="105" width="814" height="814" rx="180" fill="none" stroke="url(#edge)" stroke-width="8"/>

  <!-- H mark, designed in a 0..200 box (centered at 100,100), scaled to ~50% of the tile -->
  <g transform="translate(512,512) scale(4.12) translate(-100,-100)" fill="url(#mono)">
    <rect x="51" y="50" width="26" height="100" rx="13"/>
    <rect x="123" y="50" width="26" height="100" rx="13"/>
    <rect x="64" y="88" width="34" height="24" rx="7"/>
    <rect x="102" y="88" width="34" height="24" rx="7"/>
  </g>
</svg>
