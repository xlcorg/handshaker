<svg width="700" height="190" viewBox="0 0 700 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Handshaker">
  <!-- Horizontal lockup — H-Bridge mark + wordmark. DARK variant: light wordmark for dark README themes. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23272F"/>
      <stop offset="1" stop-color="#0B0D11"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.13"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mono" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C9CFD9"/>
    </linearGradient>
  </defs>

  <g transform="translate(6,18) scale(0.151)">
    <rect x="40" y="40" width="944" height="944" rx="212.4" fill="url(#bg)"/>
    <rect x="46" y="46" width="932" height="932" rx="206" fill="none" stroke="url(#edge)" stroke-width="8"/>
    <g transform="translate(512,512) scale(4.72) translate(-100,-100)" fill="url(#mono)">
      <rect x="51" y="50" width="26" height="100" rx="13"/>
      <rect x="123" y="50" width="26" height="100" rx="13"/>
      <rect x="64" y="88" width="34" height="24" rx="7"/>
      <rect x="102" y="88" width="34" height="24" rx="7"/>
    </g>
  </g>

  <text x="190" y="126" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="90" font-weight="600" letter-spacing="-2" fill="#E6EDF3">Handshaker</text>
</svg>
